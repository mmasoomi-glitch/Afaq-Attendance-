<!DOCTYPE html>
<html>
<head>
    <title>AFAQ Attendance & WhatsApp</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        
        /* TOP SECTION: Attendance */
        #attendance-section {
            height: 40%;
            background: #f4f4f4;
            border-bottom: 5px solid #25D366;
            padding: 20px;
            overflow-y: auto;
        }

        /* BOTTOM SECTION: Full WhatsApp */
        #whatsapp-section {
            height: 60%;
            background: #fff;
            position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        .status-bar { padding: 10px; background: #333; color: white; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="attendance-section">
        <h2>🌙 AFAQ Attendance Dashboard</h2>
        <div id="logs">Loading logs...</div>
    </div>

    <div class="status-bar">
        <span>System Status: <b id="wa-status">Checking...</b></span>
        <span>IP: 192.168.71.101</span>
    </div>

    <div id="whatsapp-section">
        <iframe src="http://127.0.0.1:3457" id="wa-frame"></iframe>
    </div>

    <script>
        // SMART POLLING: Instead of refreshing the whole page, 
        // we only check the status every 5 seconds.
        async function checkStatus() {
            try {
                const response = await fetch('/status'); // Your Python endpoint
                const data = await response.json();
                document.getElementById('wa-status').innerText = data.status;
                
                if(data.status === 'scan_me' && !document.getElementById('qr-img')) {
                    // Logic to show QR only if not connected
                }
            } catch (e) { console.log("Status check failed"); }
        }
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
